<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario de Turnos Optimizado</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #eef2f3;
        padding: 20px;
      }
      .contenedor {
        max-width: 450px;
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }
      h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 25px;
      }
      label {
        font-weight: 600;
        color: #34495e;
        margin-top: 15px;
        display: block;
      }
      input,
      select {
        width: 100%;
        padding: 12px;
        margin-top: 6px;
        margin-bottom: 20px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 15px;
        background-color: #f8fafc;
      }
      input:focus,
      select:focus {
        border-color: #3b82f6;
        outline: none;
        background-color: #fff;
      }
      button {
        width: 100%;
        padding: 12px;
        background-color: #3b82f6;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background-color: #2563eb;
      }
      button:disabled {
        background-color: #94a3b8;
        cursor: not-allowed;
      }
      #mensaje {
        margin-top: 15px;
        padding: 12px;
        border-radius: 6px;
        display: none;
        text-align: center;
        font-weight: 600;
        font-size: 14px;
      }
      .error {
        background-color: #fee2e2;
        color: #991b1b;
        border: 1px solid #fca5a5;
      }
      .exito {
        background-color: #dcfce7;
        color: #166534;
        border: 1px solid #86efac;
      }
      .cargando {
        color: #64748b;
        text-align: center;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="contenedor">
      <h2>Control de Turnos</h2>

      <div id="estadoCarga" class="cargando">
        Cargando lista de funcionarios y días...
      </div>

      <form id="formularioRegistro" style="display: none">
        <!-- Buscador de funcionarios -->
        <label for="funcionario">Buscar Funcionario:</label>
        <input
          type="text"
          id="funcionario"
          name="funcionario"
          list="listaFuncionarios"
          required
          placeholder="Escribe para buscar tu nombre..."
        />
        <datalist id="listaFuncionarios">
          <!-- Se llena dinámicamente desde Sheets -->
        </datalist>

        <!-- Desplegable de los 20 días -->
        <label for="dia">Seleccionar Día Disponible:</label>
        <select id="dia" name="dia" required>
          <option value="" disabled selected>-- Elige un día --</option>
          <!-- Se llena dinámicamente desde Sheets -->
        </select>

        <button type="submit" id="btnEnviar">Confirmar Registro</button>
      </form>

      <div id="mensaje"></div>
    </div>

    <script>
      // ⚠️ REEMPLAZA CON TU URL DE APLICACIÓN WEB DE APPS SCRIPT ⚠️
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbyD4uyhfurCwWFD_PNfbad1wPhQNc7hmXYQRYXh6qimO4S71n2x4MCpGN1TTihmI4Rq/exec";

      const formulario = document.getElementById("formularioRegistro");
      const estadoCarga = document.getElementById("estadoCarga");
      const datalistFuncionarios = document.getElementById("listaFuncionarios");
      const selectDia = document.getElementById("dia");
      const mensajeDiv = document.getElementById("mensaje");
      const btnEnviar = document.getElementById("btnEnviar");

      // AL CARGAR LA PÁGINA: Traer los datos de la hoja de cálculo
      window.addEventListener("DOMContentLoaded", () => {
        fetch(SCRIPT_URL)
          .then((res) => res.json())
          .then((data) => {
            // 1. Llenar el buscador de funcionarios
            data.funcionarios.forEach((nombre) => {
              let option = document.createElement("option");
              option.value = nombre;
              datalistFuncionarios.appendChild(option);
            });

            // 2. Llenar el desplegable de días
            data.dias.forEach((fecha) => {
              let option = document.createElement("option");
              option.value = fecha;
              // Formato visual más amigable en el frontend
              option.textContent = fecha;
              selectDia.appendChild(option);
            });

            // Mostrar el formulario y ocultar el texto de carga
            estadoCarga.style.display = "none";
            formulario.style.display = "block";
          })
          .catch((err) => {
            estadoCarga.textContent =
              "Error al cargar los datos del servidor. Verifica la conexión.";
            console.error(err);
          });
      });

      // AL ENVIAR EL FORMULARIO: Validar y guardar
      formulario.addEventListener("submit", function (e) {
        e.preventDefault();

        btnEnviar.disabled = true;
        btnEnviar.textContent = "Validando en el sistema...";
        mensajeDiv.style.display = "none";

        const formData = new URLSearchParams();
        formData.append(
          "funcionario",
          document.getElementById("funcionario").value,
        );
        formData.append("dia", document.getElementById("dia").value);

        fetch(SCRIPT_URL, {
          method: "POST",
          body: formData,
        })
          .then((res) => res.json())
          .then((datos) => {
            mensajeDiv.style.display = "block";
            mensajeDiv.className = datos.status === "error" ? "error" : "exito";
            mensajeDiv.textContent = datos.mensaje;

            if (datos.status === "exito") {
              formulario.reset();
            }
          })
          .catch((error) => {
            mensajeDiv.style.display = "block";
            mensajeDiv.className = "error";
            mensajeDiv.textContent =
              "Error de comunicación con la base de datos.";
          })
          .finally(() => {
            btnEnviar.disabled = false;
            btnEnviar.textContent = "Confirmar Registro";
          });
      });
    </script>
  </body>
</html>
